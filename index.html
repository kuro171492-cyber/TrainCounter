<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Тренировка</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <!-- lucide-react UMD ожидает global.react, поэтому пробрасываем React туда -->
  <script>
    window.react = window.React;
  </script>
  <script src="https://cdn.jsdelivr.net/npm/lucide-react@0.577.0/dist/umd/lucide-react.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // Без сборщика: берем иконки из глобального LucideReact (UMD).
    // Если какой-то конкретной иконки нет — даем fallback-пустую компоненту, чтобы логика не падала.
    const pickIcon = (name) =>
      (typeof LucideReact !== 'undefined' && LucideReact && LucideReact[name])
        ? LucideReact[name]
        : () => null;

    const Plus = pickIcon('Plus');
    const Trash2 = pickIcon('Trash2');
    const Repeat = pickIcon('Repeat');
    const Play = pickIcon('Play');
    const Square = pickIcon('Square');
    const X = pickIcon('X');
    const ChevronDown = pickIcon('ChevronDown');
    const ChevronUp = pickIcon('ChevronUp');
    const Activity = pickIcon('Activity');
    const Volume2 = pickIcon('Volume2');
    const VolumeX = pickIcon('VolumeX');
    const Minus = pickIcon('Minus');
    const Check = pickIcon('Check');
    const Clock = pickIcon('Clock');
    const RotateCcw = pickIcon('RotateCcw');
    const Flame = pickIcon('Flame');
    const ArrowUp = pickIcon('ArrowUp');
    const CopyPlus = pickIcon('CopyPlus');
    const Settings2 = pickIcon('Settings2');
    const Pencil = pickIcon('Pencil');
    const Timer = pickIcon('Timer');
    const Hash = pickIcon('Hash');
    const Lock = pickIcon('Lock');
    const Layers = pickIcon('Layers');
    const GripVertical = pickIcon('GripVertical');
    const Download = pickIcon('Download');

const generateId = () => Math.random().toString(36).substr(2, 9);

const DAYS_OF_WEEK = ['Пн', 'Вт', 'Ср', 'Чт', 'Пт', 'Сб', 'Вс'];
const QUICK_REPS = ['5', '8', '10', '12', '15', '20', 'MAX'];
const QUICK_TIME = ['5s', '10s', '15s', '30s', '45s', '60s', '90s', '2m', '3m', '5m'];
const QUICK_WEIGHTS = ['0', '2.5', '5', '10', '15', '20', '25', '50'];
const PREP_OPTIONS = ['0s', '5s', '10s', '15s', '20s'];
const DEFAULT_WORK_OVERTIME_ENABLED = false;

const DEFAULT_VALUES = [
  'Сессия', 'Новое упражнение', 'Новый суперсет', 'Приседания', 'Отжимания', 'Новое упр'
];

const parseToSeconds = (val) => {
  if (!val) return 0;
  const str = val.toString().toLowerCase();
  const num = parseInt(str.replace(/\D/g, '')) || 0;
  if (str.includes('m')) return num * 60;
  return num;
};

const formatTime = (totalSeconds) => {
  const m = Math.floor(Math.abs(totalSeconds) / 60);
  const s = Math.abs(totalSeconds) % 60;
  return `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
};

const formatWallTime = (timestamp) => {
  if (!timestamp) return '--:--';
  const date = new Date(timestamp);
  return date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
};

const adjustValue = (val, delta) => {
  const str = (val || '').toString();
  if (str === 'MAX') return delta > 0 ? '1' : 'MAX';
  const match = str.match(/^(\d+)(s|m)?$/);
  if (match) {
     const num = Math.max(0, parseInt(match[1]) + delta);
     const unit = match[2] || '';
     return `${num}${unit}`;
  }
  return Math.max(0, parseInt(val || 0) + delta).toString();
};

const adjustWeight = (val, delta) => {
  const num = parseFloat(val || 0);
  return Math.max(0, +(num + delta).toFixed(2)).toString();
};

const SmartInput = ({ value, onChange, className, placeholder, defaultValue, allowInlineEdit = true, editTrigger = 0 }) => {
  const [isEditing, setIsEditing] = useState(false);
  const timerRef = useRef(null);
  const inputRef = useRef(null);

  const startEditing = () => {
    setIsEditing(true);
    setTimeout(() => {
      if (inputRef.current) {
        inputRef.current.focus();
        const val = inputRef.current.value;
        inputRef.current.value = '';
        inputRef.current.value = val;
      }
    }, 50);
  };

  const handleTouchStart = (e) => {
    if (!allowInlineEdit) return;
    timerRef.current = setTimeout(() => {
      startEditing();
    }, 600);
  };

  const handleTouchMove = () => {
    if (timerRef.current) clearTimeout(timerRef.current);
  };

  const handleTouchEnd = () => {
    if (timerRef.current) clearTimeout(timerRef.current);
  };

  const handleDoubleClick = (e) => {
    if (!allowInlineEdit) return;
    e.stopPropagation();
    e.preventDefault();
    startEditing();
  };

  useEffect(() => {
    if (editTrigger > 0) startEditing();
  }, [editTrigger]);

  const handleBlur = (e) => {
    setIsEditing(false);
    if (e.target.value.trim() === '') {
      onChange({ target: { value: defaultValue || placeholder || 'Без названия' } });
    }
  };

  const handleFocus = (e) => {
    const val = e.target.value.trim();
    const isDefault = DEFAULT_VALUES.some(def =>
      val.toLowerCase() === def.toLowerCase() ||
      (val.startsWith(def) && !isNaN(val.replace(def, "").trim()))
    );
    if (isDefault) onChange({ target: { value: '' } });
  };

  const handleKeyDown = (e) => {
    if (e.key === 'Enter') inputRef.current?.blur();
  };

  return (
    <div className="relative flex-1 min-w-0 flex items-center">
      <input
        ref={inputRef}
        type="text"
        value={value}
        onChange={onChange}
        onFocus={handleFocus}
        onBlur={handleBlur}
        onKeyDown={handleKeyDown}
        onDoubleClick={handleDoubleClick}
        onTouchStart={handleTouchStart}
        onTouchMove={handleTouchMove}
        onTouchEnd={handleTouchEnd}
        onTouchCancel={handleTouchEnd}
        readOnly={!isEditing}
        className={`
          ${className} w-full transition-all duration-200
          ${isEditing ? 'bg-black/40 ring-1 ring-red-500 rounded px-1 text-red-400' : 'cursor-default pointer-events-auto'}
        `}
        placeholder={placeholder}
      />
    </div>
  );
};

const SwipeableCell = ({ children, onSwipeRight, isDone, canSwipe, isHighlighted, isSessionActive }) => {
  const [startX, setStartX] = useState(0);
  const [offsetX, setOffsetX] = useState(0);
  const threshold = 60;

  const handleTouchStart = (e) => {
    if (!isSessionActive || !canSwipe || isDone || !isHighlighted) return;
    setStartX(e.touches[0].clientX);
  };

  const handleTouchMove = (e) => {
    if (!isSessionActive || !canSwipe || isDone || !isHighlighted) return;
    const diff = e.touches[0].clientX - startX;
    if (diff > 0) setOffsetX(Math.min(diff, 100));
  };

  const handleTouchEnd = () => {
    if (offsetX > threshold) onSwipeRight();
    setOffsetX(0);
  };

  const getStyleClasses = () => {
    if (isDone) return 'ring-2 ring-[#32D74B] ring-inset opacity-60 scale-95';
    if (!isSessionActive) return 'ring-1 ring-white/10 opacity-100 scale-100';
    if (isHighlighted) return 'ring-2 ring-red-500 ring-inset opacity-100 scale-105 z-10 shadow-lg shadow-red-900/20';
    return 'opacity-30 scale-100 ring-1 ring-white/5 pointer-events-none';
  };

  return (
    <div className={`relative overflow-hidden rounded-[16px] flex-1 h-full transition-all duration-300 ${getStyleClasses()}`}>
      <div className="absolute inset-0 bg-red-600 flex items-center pl-4 transition-opacity duration-200" style={{ opacity: offsetX > 10 ? 1 : 0 }}>
        <Play className="w-4 h-4 text-white fill-white" />
      </div>
      <div
        onTouchStart={handleTouchStart} onTouchMove={handleTouchMove} onTouchEnd={handleTouchEnd}
        style={{ transform: `translateX(${offsetX}px)` }}
        className="relative z-10 h-full w-full transition-transform duration-200"
      >
        {children}
      </div>
    </div>
  );
};

function App() {
  const [schedule, setSchedule] = useState(() => {
    const saved = typeof localStorage !== 'undefined' ? localStorage.getItem('wb_neon_clean_v54') : null;
    return saved ? JSON.parse(saved) : [];
  });

  const [activeDayName, setActiveDayName] = useState('Пн');
  const [activeSessionIdx, setActiveSessionIdx] = useState(0);
  const [showScrollTop, setShowScrollTop] = useState(false);
  const [isStickyVisible, setIsStickyVisible] = useState(false);
  const [modal, setModal] = useState({ show: false, title: '', options: [], onSelect: null, currentVal: '', currentWeight: '0', hasWeightTab: false, activeTab: 'value' });
  const [confirmModal, setConfirmModal] = useState({ show: false, onConfirm: null, message: '', title: '' });
  const [soundEnabled, setSoundEnabled] = useState(true);
  const [activeSession, setActiveSession] = useState({ dayId: null, elapsed: 0, startTime: null });
  const [activeTimer, setActiveTimer] = useState({ active: false, timeLeft: 0, type: 'rest', label: '', onComplete: null, isOvertime: false, allowOvertime: false, initialTime: 0 });

  const audioCtx = useRef(null);
  const mainTimerRef = useRef(null);

  useEffect(() => {
    localStorage.setItem('wb_neon_clean_v54', JSON.stringify(schedule));
  }, [schedule]);

  useEffect(() => {
    const handleScroll = () => {
      setShowScrollTop(window.scrollY > 300);
      if (mainTimerRef.current) {
        const rect = mainTimerRef.current.getBoundingClientRect();
        setIsStickyVisible(rect.bottom < 0);
      } else {
        setIsStickyVisible(false);
      }
    };
    window.addEventListener('scroll', handleScroll);
    return () => window.removeEventListener('scroll', handleScroll);
  }, []);

  const createNewDay = (dayName) => {
    const daySessions = schedule.filter(d => d.dayName === dayName);
    const newDay = {
      id: generateId(),
      dayName: dayName,
      title: `Сессия ${daySessions.length + 1}`,
      blocks: [],
      isCollapsed: false,
      activeBlockId: null,
      createdAt: Date.now()
    };
    setSchedule(prev => [...prev, newDay]);
    setActiveDayName(dayName);
    setActiveSessionIdx(daySessions.length);
  };

  const selectDay = (dayName) => {
    if (activeDayName === dayName) {
      setConfirmModal({
        show: true,
        title: "Новая тренировка",
        message: `Создать еще одну тренировочную сессию на ${dayName}?`,
        onConfirm: () => createNewDay(dayName)
      });
      return;
    }
    const daySessions = schedule.filter(d => d.dayName === dayName);
    if (daySessions.length === 0) {
      createNewDay(dayName);
    } else {
      setActiveDayName(dayName);
      setActiveSessionIdx(0);
    }
    window.scrollTo({ top: 0, behavior: 'smooth' });
  };

  const playMetronome = (type) => {
    if (!soundEnabled) return;
    try {
      if (!audioCtx.current) audioCtx.current = new (window.AudioContext || window.webkitAudioContext)();
      const ctx = audioCtx.current;
      if (ctx.state === 'suspended') ctx.resume();
      const now = ctx.currentTime;

      const beep = ({ freq = 1000, dur = 0.05, vol = 0.2, rampTo, rampDur }) => {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        gain.gain.setValueAtTime(Math.max(0.0001, vol), now);
        osc.frequency.setValueAtTime(freq, now);
        if (rampTo != null && rampDur != null) {
          osc.frequency.exponentialRampToValueAtTime(rampTo, now + rampDur);
        }
        gain.gain.exponentialRampToValueAtTime(0.0001, now + dur);
        osc.start(now);
        osc.stop(now + dur);
      };

      if (type === 'tick') beep({ freq: 980, dur: 0.04, vol: 0.18 });
      else if (type === 'prepTick') beep({ freq: 760, dur: 0.045, vol: 0.16 });
      else if (type === 'countdown') beep({ freq: 1500, dur: 0.09, vol: 0.28 });
      else if (type === 'start') {
        // короткий "старт": два быстрых сигнала
        beep({ freq: 1200, dur: 0.06, vol: 0.25 });
        const osc2 = ctx.createOscillator();
        const gain2 = ctx.createGain();
        osc2.connect(gain2);
        gain2.connect(ctx.destination);
        gain2.gain.setValueAtTime(0.22, now + 0.09);
        osc2.frequency.setValueAtTime(1800, now + 0.09);
        gain2.gain.exponentialRampToValueAtTime(0.0001, now + 0.16);
        osc2.start(now + 0.09);
        osc2.stop(now + 0.16);
      }
      else if (type === 'finish') beep({ freq: 650, rampTo: 1300, rampDur: 0.25, dur: 0.38, vol: 0.28 });
      else if (type === 'restFinish') beep({ freq: 520, rampTo: 900, rampDur: 0.18, dur: 0.32, vol: 0.26 });
    } catch (e) {}
  };

  useEffect(() => {
    let interval;
    if (activeSession.dayId) {
      interval = setInterval(() => setActiveSession(prev => ({ ...prev, elapsed: prev.elapsed + 1 })), 1000);
    }
    return () => clearInterval(interval);
  }, [activeSession.dayId]);

  useEffect(() => {
    let interval;
    if (activeTimer.active) {
      interval = setInterval(() => {
        if (activeTimer.type === 'rest' || activeTimer.type === 'prep') {
          if (activeTimer.timeLeft > 0) {
            const nextTime = activeTimer.timeLeft - 1;
            if (activeTimer.type === 'prep') {
              // подготовка: тик каждую секунду, последние 3 сек — более яркий сигнал
              if (nextTime <= 3) playMetronome('countdown');
              else playMetronome('prepTick');
            }
            setActiveTimer(prev => ({ ...prev, timeLeft: nextTime }));
          } else {
            if (activeTimer.type === 'prep') {
              const { label, workTime, onComplete } = activeTimer.meta;
              playMetronome('start');
              setActiveTimer({
                active: true,
                timeLeft: parseToSeconds(workTime),
                type: 'work',
                label,
                onComplete,
                isOvertime: false,
                allowOvertime: !!activeTimer.meta?.allowOvertime,
                initialTime: parseToSeconds(workTime)
              });
            } else {
              const cb = activeTimer.onComplete;
              playMetronome('restFinish');
              setActiveTimer({ active: false, timeLeft: 0, type: 'rest', label: '', onComplete: null, isOvertime: false, allowOvertime: false, initialTime: 0 });
              if (cb) cb();
            }
          }
        } else if (activeTimer.type === 'work') {
          if (!activeTimer.isOvertime) {
            if (activeTimer.timeLeft > 0) {
              const nextTime = activeTimer.timeLeft - 1;
              // упражнение: метроном каждую секунду, последние 3 сек — countdown
              if (nextTime <= 3) playMetronome('countdown');
              else playMetronome('tick');
              setActiveTimer(prev => ({ ...prev, timeLeft: nextTime }));
            } else {
              const cb = activeTimer.onComplete;
              playMetronome('finish');
              if (activeTimer.allowOvertime) {
                setActiveTimer(prev => ({ ...prev, isOvertime: true, timeLeft: 1 }));
              } else {
                setActiveTimer({ active: false, timeLeft: 0, type: 'rest', label: '', onComplete: null, isOvertime: false, allowOvertime: false, initialTime: 0 });
                if (cb) cb();
              }
            }
          } else {
            setActiveTimer(prev => ({ ...prev, timeLeft: prev.timeLeft + 1 }));
          }
        }
      }, 1000);
    }
    return () => clearInterval(interval);
  }, [activeTimer.active, activeTimer.timeLeft, activeTimer.type]);

  const triggerTimer = (timeStr, type = 'rest', label = '', onComplete = null, prepTimeStr = '0s') => {
    if (!activeSession.dayId) return;
    const pSecs = parseToSeconds(prepTimeStr);
    const wSecs = parseToSeconds(timeStr);
    const allowOvertime = type === 'work' ? DEFAULT_WORK_OVERTIME_ENABLED : false;
    if (type === 'work' && pSecs > 0) {
      setActiveTimer({ active: true, timeLeft: pSecs, type: 'prep', label, onComplete: null, isOvertime: false, allowOvertime: false, meta: { workTime: timeStr, label, onComplete, allowOvertime }, initialTime: pSecs });
    } else {
      setActiveTimer({ active: true, timeLeft: wSecs, type, label, onComplete, isOvertime: false, allowOvertime, initialTime: wSecs });
    }
  };

  const daySessions = schedule.filter(d => d.dayName === activeDayName);
  const activeDayData = daySessions[activeSessionIdx] || daySessions[0];

  const toggleAllBlocks = () => {
    if (!activeDayData) return;
    const isAnyExpanded = !!activeDayData.activeBlockId;
    const nextId = isAnyExpanded ? null : (activeDayData.blocks[0]?.id || null);

    setSchedule(schedule.map(d =>
      d.id === activeDayData.id
        ? { ...d, activeBlockId: nextId }
        : d
    ));
  };

  const saveToFile = () => {
    const payload = {
      exportedAt: new Date().toISOString(),
      schedule
    };
    const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const link = document.createElement('a');
    const dateSuffix = new Date().toISOString().slice(0, 10);
    link.href = url;
    link.download = `traincounter-backup-${dateSuffix}.json`;
    link.click();
    URL.revokeObjectURL(url);
  };

  const stopSessionAndResetProgress = () => {
    if (!activeSession.dayId) {
      setActiveSession({ dayId: null, elapsed: 0, startTime: null });
      return;
    }

    setSchedule(prev => prev.map(day => {
      if (day.id !== activeSession.dayId) return day;
      return {
        ...day,
        blocks: (day.blocks || []).map(block => {
          if (block.type === 'exercise') {
            return {
              ...block,
              setsData: (block.setsData || []).map(set => ({ ...set, completed: false }))
            };
          }
          if (block.type === 'superset') {
            return { ...block, completedRounds: [] };
          }
          return block;
        })
      };
    }));

    setActiveSession({ dayId: null, elapsed: 0, startTime: null });
  };

  return (
    <div className="min-h-screen bg-black text-white font-sans pb-24 overflow-x-hidden">
      {/* Header */}
      <div className="bg-[#1C1C1E]/95 backdrop-blur-2xl border-b border-white/5 sticky top-0 z-[100] px-4 py-3 flex flex-col gap-3 shadow-2xl">
        <div className="flex items-center justify-between">
          <div className="flex items-center gap-2.5">
            <div className="bg-[#FF3B30] p-1.5 rounded-lg shadow-lg">
              <Flame className="w-4 h-4 text-white fill-white" />
            </div>
            <h1 className="text-sm font-black tracking-tight uppercase italic text-white/90">Workouts</h1>
          </div>
          <div className="flex items-center gap-2">
            <button
              onClick={saveToFile}
              className="p-2 rounded-full transition-all bg-[#2C2C2E] text-white border border-white/10 active:scale-95"
              title="Сохранить в файл"
            >
              <Download className="w-4 h-4" />
            </button>
            <button onClick={() => setSoundEnabled(!soundEnabled)} className={`p-2 rounded-full transition-all ${soundEnabled ? 'bg-red-600/20 text-red-400' : 'bg-white/10 text-white/40'}`}>
              {soundEnabled ? <Volume2 className="w-4 h-4" /> : <VolumeX className="w-4 h-4" />}
            </button>
          </div>
        </div>

        <div className="flex items-center gap-1.5 overflow-x-auto no-scrollbar">
          {DAYS_OF_WEEK.map(day => {
            const isActive = activeDayName === day;
            const sessionsCount = schedule.filter(d => d.dayName === day).length;
            const isCreated = sessionsCount > 0;
            return (
              <button
                key={day}
                onClick={() => selectDay(day)}
                className={`
                  flex-1 min-w-[42px] h-10 flex flex-col items-center justify-center rounded-lg font-black text-[10px] transition-all relative
                  ${isActive ? 'bg-[#FF3B30] text-white shadow-xl scale-105 z-10' :
                    isCreated ? 'bg-[#3A3A3C] text-white border border-white/10' : 'bg-[#2C2C2E] text-[#48484A]'}
                `}
              >
                {day}
                {isCreated && !isActive && <div className="absolute top-1 right-1 w-1 h-1 bg-red-500 rounded-full" />}
              </button>
            );
          })}
        </div>
      </div>

      <div className="p-3 space-y-4">
        {activeDayData ? (
          <DayContainer
            day={activeDayData}
            timerRef={mainTimerRef}
            isTimerActive={activeTimer.active}
            isSessionActive={activeSession.dayId === activeDayData.id}
            sessionElapsed={activeSession.elapsed}
            sessionStartTime={activeSession.startTime}
            onStart={(firstExerciseId) => {
              setSchedule(prev => prev.map(d =>
                d.id === activeDayData.id
                  ? { ...d, isCollapsed: false, activeBlockId: firstExerciseId || d.activeBlockId }
                  : d
              ));
              setActiveSession({ dayId: activeDayData.id, elapsed: 0, startTime: Date.now() });
            }}
            onStop={stopSessionAndResetProgress}
            onRemove={() => {
              const newSchedule = schedule.filter(d => d.id !== activeDayData.id);
              setSchedule(newSchedule);
              setActiveSessionIdx(0);
            }}
            onUpdate={(data) => setSchedule(schedule.map(d => d.id === activeDayData.id ? { ...d, ...data } : d))}
            openModal={(t, o, c, s, h, w) => setModal({ show: true, title: t, options: o, currentVal: c, onSelect: s, hasWeightTab: h, currentWeight: w, activeTab: 'value' })}
            openConfirm={(m, c, tit) => setConfirmModal({ show: true, message: m, onConfirm: c, title: tit || 'Подтверждение' })}
            triggerTimer={triggerTimer}
          />
        ) : (
          <div className="py-20 text-center text-[#48484A] uppercase italic font-black text-[10px] tracking-widest animate-pulse">
            Выберите день
          </div>
        )}
      </div>

      {activeSession.dayId && isStickyVisible && (
        <div className="fixed bottom-0 left-0 right-0 z-[150] px-4 pb-6 pt-10 bg-gradient-to-t from-black via-black/95 to-transparent animate-in slide-in-from-bottom duration-300 pointer-events-none">
          <div className="max-w-md mx-auto flex items-center gap-3 bg-[#1C1C1E] p-3 rounded-[24px] border border-red-500/30 shadow-[0_-10px_40px_rgba(255,59,48,0.2)] pointer-events-auto">
            <div className="flex-1 flex flex-col justify-center px-4">
              <div className="flex items-center gap-1.5 mb-0.5">
                <div className="w-1.5 h-1.5 bg-red-500 rounded-full animate-pulse" />
                <span className="text-[8px] font-black uppercase text-red-500/60 italic tracking-[0.2em]">Active Session</span>
              </div>
              <div className="flex items-baseline gap-2">
                <span className="text-white font-black text-2xl tabular-nums italic tracking-tighter leading-none">{formatTime(activeSession.elapsed)}</span>
                <span className="text-[10px] text-[#48484A] font-black italic">started {formatWallTime(activeSession.startTime)}</span>
              </div>
            </div>
            <button
              onClick={stopSessionAndResetProgress}
              className="w-12 h-12 bg-red-600 rounded-2xl flex items-center justify-center text-white active:scale-95 shadow-lg shadow-red-900/40"
            >
              <Square className="w-5 h-5 fill-white" />
            </button>
          </div>
        </div>
      )}

      {/* Floating Action Buttons Area */}
      <div className={`fixed right-6 z-[160] flex flex-col gap-3 transition-all ${activeSession.dayId && isStickyVisible ? 'bottom-28' : 'bottom-6'}`}>
        {activeDayData && activeDayData.blocks.length > 0 && (
          <button
            onClick={toggleAllBlocks}
            className="w-12 h-12 bg-[#2C2C2E] text-white rounded-full flex items-center justify-center shadow-2xl border border-white/10 active:scale-90 transition-all"
            title={activeDayData.activeBlockId ? "Свернуть все" : "Развернуть первое"}
          >
            {activeDayData.activeBlockId ? <ChevronUp className="w-5 h-5" /> : <Layers className="w-5 h-5" />}
          </button>
        )}

        {showScrollTop && (
          <button
            onClick={() => window.scrollTo({ top: 0, behavior: 'smooth' })}
            className="w-12 h-12 bg-red-600 text-white rounded-full flex items-center justify-center shadow-2xl active:scale-90 transition-all"
          >
            <ArrowUp className="w-5 h-5" />
          </button>
        )}
      </div>

      {/* Timer Overlay */}
      {activeTimer.active && (
        <div className={`fixed inset-0 z-[200] flex flex-col items-center justify-center p-6 text-white transition-colors duration-500 ${activeTimer.type === 'rest' ? 'bg-[#FF9500]' : activeTimer.type === 'prep' ? 'bg-orange-600' : activeTimer.isOvertime ? 'bg-red-900' : 'bg-[#FF3B30]'}`}>
          <span className="text-[10px] font-black uppercase tracking-[0.3em] opacity-80 mb-4 italic">{activeTimer.type === 'rest' ? 'Восстановление' : activeTimer.type === 'prep' ? 'Приготовьтесь' : activeTimer.isOvertime ? 'Превышение' : activeTimer.label}</span>
          <h2 className="text-9xl font-black tabular-nums tracking-tighter leading-none mb-16">{activeTimer.isOvertime ? '+' : ''}{formatTime(activeTimer.timeLeft)}</h2>
          <div className="flex items-center gap-8">
            <button onClick={() => setActiveTimer(p => ({ ...p, timeLeft: p.initialTime, isOvertime: false }))} className="w-16 h-16 rounded-full flex items-center justify-center bg-black/20"><RotateCcw className="w-6 h-6" /></button>
            <button onClick={() => { const {onComplete, type} = activeTimer; setActiveTimer({ active: false, timeLeft: 0, type: 'rest', label: '', onComplete: null, isOvertime: false, allowOvertime: false, initialTime: 0 }); if (type === 'work' && onComplete) onComplete(); }} className={`w-24 h-24 rounded-full flex items-center justify-center shadow-2xl ${activeTimer.isOvertime ? 'bg-[#32D74B]' : 'bg-black/30'}`}>{activeTimer.isOvertime ? <Check className="w-10 h-10 text-black" /> : <Square className="w-8 h-8 fill-white" />}</button>
            <button onClick={() => setActiveTimer({ ...activeTimer, active: false })} className="w-16 h-16 rounded-full flex items-center justify-center bg-black/20 text-white/50"><X className="w-6 h-6" /></button>
          </div>
        </div>
      )}

      {/* Modals */}
      {modal.show && (
        <div className="fixed inset-0 bg-black/90 backdrop-blur-xl z-[210] flex items-end">
          <div className="bg-[#1C1C1E] w-full rounded-t-[32px] p-6 pb-10 border-t border-white/10 animate-in slide-in-from-bottom duration-400">
            <div className="w-12 h-1 bg-white/10 rounded-full mx-auto mb-6" />
            <div className="flex items-center gap-4 mb-6">
               <button onClick={() => setModal({...modal, activeTab: 'value'})} className={`pb-1 border-b-2 font-black text-xl transition-all ${modal.activeTab === 'value' ? 'border-red-500 text-white' : 'border-transparent text-[#48484A]'}`}>{modal.title}</button>
               {modal.hasWeightTab && <button onClick={() => setModal({...modal, activeTab: 'weight'})} className={`pb-1 border-b-2 font-black text-xl transition-all ${modal.activeTab === 'weight' ? 'border-red-500 text-white' : 'border-transparent text-[#48484A]'}`}>Вес (кг)</button>}
               <button onClick={() => setModal({ ...modal, show: false })} className="ml-auto p-1 text-[#48484A]"><X className="w-6 h-6" /></button>
            </div>

            <div className="flex items-center justify-between mb-8 bg-black/40 p-6 rounded-2xl border border-white/5 shadow-inner">
               <button onClick={() => modal.activeTab === 'weight' ? setModal({...modal, currentWeight: adjustWeight(modal.currentWeight, -0.5)}) : setModal({...modal, currentVal: adjustValue(modal.currentVal, -1)})} className="w-14 h-14 bg-[#2C2C2E] rounded-full flex items-center justify-center active:scale-90"><Minus className="w-6 h-6 text-white" /></button>
               <div className="text-5xl font-black text-orange-500 tabular-nums italic">{modal.activeTab === 'weight' ? modal.currentWeight : modal.currentVal}</div>
               <button onClick={() => modal.activeTab === 'weight' ? setModal({...modal, currentWeight: adjustWeight(modal.currentWeight, 0.5)}) : setModal({...modal, currentVal: adjustValue(modal.currentVal, 1)})} className="w-14 h-14 bg-red-600 rounded-full flex items-center justify-center active:scale-90"><Plus className="w-6 h-6 text-white" /></button>
            </div>

            <div className="grid grid-cols-4 gap-2 mb-8">
              {(modal.activeTab === 'weight' ? QUICK_WEIGHTS : modal.options).map(opt => (
                <button key={opt} onClick={() => setModal({...modal, [modal.activeTab === 'weight' ? 'currentWeight' : 'currentVal']: opt})} className={`py-3 rounded-xl font-black text-[11px] transition-all border ${ (modal.activeTab === 'weight' ? modal.currentWeight === opt : modal.currentVal === opt) ? 'bg-red-600 border-red-500 text-white' : 'bg-[#2C2C2E] border-transparent text-[#8E8E93]'}`}>{opt}</button>
              ))}
            </div>
            <button onClick={() => { modal.onSelect(modal.currentVal, modal.currentWeight); setModal({ ...modal, show: false }); }} className="w-full bg-red-600 text-white py-5 rounded-2xl font-black text-lg active:scale-95 shadow-2xl shadow-red-900/40 uppercase italic tracking-widest">ПОДТВЕРДИТЬ</button>
          </div>
        </div>
      )}

      {confirmModal.show && (
        <div className="fixed inset-0 bg-black/80 backdrop-blur-2xl z-[300] flex items-center justify-center p-6">
           <div className="bg-[#1C1C1E] w-full max-w-xs rounded-[32px] p-8 border border-white/10 shadow-3xl text-center">
              <div className="w-16 h-16 bg-red-600/10 rounded-2xl flex items-center justify-center mx-auto mb-6 text-red-600">
                 {confirmModal.title === 'Удаление' ? <Trash2 className="w-8 h-8" /> : <CopyPlus className="w-8 h-8" />}
              </div>
              <h3 className="font-black text-xl mb-2 uppercase italic">{confirmModal.title}</h3>
              <p className="text-[#8E8E93] text-sm mb-10 leading-snug">{confirmModal.message}</p>
              <div className="flex flex-col gap-3">
                 <button onClick={() => { confirmModal.onConfirm(); setConfirmModal({...confirmModal, show: false}); }} className="w-full bg-red-600 text-white py-4 rounded-xl font-black text-xs uppercase italic active:scale-95 shadow-lg shadow-red-900/30">Продолжить</button>
                 <button onClick={() => setConfirmModal({...confirmModal, show: false})} className="w-full bg-white/5 text-[#8E8E93] py-4 rounded-xl font-black text-xs uppercase italic">Отмена</button>
              </div>
           </div>
        </div>
      )}
    </div>
  );
}

function DayContainer({ day, timerRef, onUpdate, openModal, openConfirm, triggerTimer, isTimerActive, isSessionActive, sessionElapsed, sessionStartTime, onStart, onStop, onRemove }) {
  const [draggedId, setDraggedId] = useState(null);
  const [targetId, setTargetId] = useState(null);
  const [pendingFocus, setPendingFocus] = useState(null);
  const firstExerciseId = day.blocks.find(block => block.type === 'exercise')?.id || null;

  const addBlock = (type) => {
    const newId = generateId();
    const newBlock = { id: newId, type, name: type === 'exercise' ? 'Новое упражнение' : 'Новый суперсет', restTime: '60s', prepTime: '5s', isSettingsOpen: true };
    if (type === 'exercise') {
      newBlock.mode = 'reps';
      newBlock.setsData = [
        { id: generateId(), value: '10', weight: '0', completed: false },
        { id: generateId(), value: '10', weight: '0', completed: false },
        { id: generateId(), value: '10', weight: '0', completed: false }
      ];
    } else {
      newBlock.rounds = 3;
      const ex1Id = generateId();
      const ex2Id = generateId();
      newBlock.exercises = [{ id: ex1Id, name: 'Приседания', mode: 'reps' }, { id: ex2Id, name: 'Отжимания', mode: 'reps' }];
      newBlock.values = [
        { [ex1Id]: { value: '10', weight: '0' }, [ex2Id]: { value: '10', weight: '0' } },
        { [ex1Id]: { value: '10', weight: '0' }, [ex2Id]: { value: '10', weight: '0' } },
        { [ex1Id]: { value: '10', weight: '0' }, [ex2Id]: { value: '10', weight: '0' } }
      ];
      newBlock.completedRounds = [];
    }
    onUpdate({ blocks: [...day.blocks, newBlock], activeBlockId: newId });
  };

  // Drag and Drop Logic
  const handleDragStart = (id) => {
    if (isSessionActive) return;
    setDraggedId(id);
  };

  const handleDragOver = (e, id) => {
    e.preventDefault();
    if (draggedId === id) return;
    setTargetId(id);
  };

  const handleDragEnd = () => {
    if (!draggedId || !targetId) {
      setDraggedId(null);
      setTargetId(null);
      return;
    }

    const draggedIdx = day.blocks.findIndex(b => b.id === draggedId);
    const targetIdx = day.blocks.findIndex(b => b.id === targetId);

    const newBlocks = [...day.blocks];
    const [draggedItem] = newBlocks.splice(draggedIdx, 1);
    newBlocks.splice(targetIdx, 0, draggedItem);

    onUpdate({ blocks: newBlocks });
    setDraggedId(null);
    setTargetId(null);
  };

  const goToNextExercise = (currentBlockId, options = {}) => {
    const currentIdx = day.blocks.findIndex(b => b.id === currentBlockId);
    if (currentIdx === -1) return;
    const nextExercise = day.blocks.slice(currentIdx + 1).find(b => b.type === 'exercise');
    if (nextExercise) {
      onUpdate({ activeBlockId: nextExercise.id });
      if (options.fullscreen) {
        setPendingFocus({ blockId: nextExercise.id, setIdx: options.setIdx ?? 0, fullscreen: true, id: generateId() });
      }
    }
  };

  return (
    <div className={`bg-[#1C1C1E] rounded-[32px] overflow-hidden transition-all duration-300 border ${isSessionActive ? 'border-red-500 shadow-[0_0_40px_rgba(255,59,48,0.15)]' : 'border-white/5'}`}>
      <div className="p-4 flex flex-col gap-3" ref={timerRef}>
        <div className="flex items-center justify-between">
          <div className="flex flex-col gap-0.5 flex-1 overflow-hidden">
            <div className="flex items-center gap-2">
              <span className="bg-[#FF3B30] text-white px-2 py-0.5 rounded-md font-black text-[8px] uppercase italic tracking-tighter">{day.dayName}</span>
              <span className="text-[8px] font-black uppercase tracking-widest text-[#48484A] italic">Workout Plan</span>
            </div>
            <SmartInput
              value={day.title}
              defaultValue={`Сессия`}
              onChange={(e) => onUpdate({ title: e.target.value })}
              className="font-black text-2xl bg-transparent outline-none flex-1 truncate text-white uppercase italic tracking-tight"
              placeholder="Session Name"
            />
          </div>
          <div className="flex items-center gap-1">
            <button onClick={() => openConfirm('Удалить этот план?', onRemove, 'Удаление')} className="p-2 text-[#48484A] hover:text-red-500 transition-colors"><Trash2 className="w-5 h-5" /></button>
            <button onClick={() => onUpdate({ isCollapsed: !day.isCollapsed })} className="p-2.5 bg-white/5 rounded-xl text-white">{day.isCollapsed ? <ChevronDown size={20} /> : <ChevronUp size={20} />}</button>
          </div>
        </div>

        {!isSessionActive ? (
          <button onClick={() => onStart(firstExerciseId)} className="h-12 bg-red-600 text-white rounded-2xl flex items-center justify-center gap-3 font-black text-xs uppercase italic active:scale-[0.98] transition-all shadow-xl shadow-red-900/40 tracking-widest">
            <Play className="w-4 h-4 fill-white" /> СТАРТ
          </button>
        ) : (
          <div className="flex gap-2">
            <div className="flex-1 flex flex-col items-center justify-center h-14 bg-black/40 border border-red-500/30 rounded-2xl shadow-inner relative overflow-hidden">
              <div className="flex items-center gap-1 mb-0.5">
                <Clock size={8} className="text-red-500/60" />
                <span className="text-[7px] font-black uppercase text-red-500/60 italic tracking-widest">Started at {formatWallTime(sessionStartTime)}</span>
              </div>
              <div className="flex items-center">
                <div className="w-1.5 h-1.5 bg-red-500 rounded-full mr-3 animate-pulse" />
                <span className="text-white font-black text-2xl tabular-nums italic tracking-tighter leading-none">{formatTime(sessionElapsed)}</span>
              </div>
            </div>
            <button onClick={onStop} className="w-14 h-14 bg-red-600 rounded-2xl flex items-center justify-center text-white active:scale-95 shadow-xl shadow-red-900/20"><Square className="w-5 h-5 fill-white" /></button>
          </div>
        )}
      </div>

      {!day.isCollapsed && (
        <div className="px-3 pb-5 space-y-3 bg-black/30">
          {day.blocks.map((block) => (
            <div
              key={block.id}
              draggable={!isSessionActive}
              onDragStart={() => handleDragStart(block.id)}
              onDragOver={(e) => handleDragOver(e, block.id)}
              onDragEnd={handleDragEnd}
              className={`transition-all duration-200 ${draggedId === block.id ? 'opacity-20 scale-95' : 'opacity-100'} ${targetId === block.id ? 'border-t-2 border-red-500 pt-2' : ''}`}
            >
              <BlockItem
                block={block}
                isExpanded={day.activeBlockId === block.id}
                isTimerActive={isTimerActive}
                isSessionActive={isSessionActive}
                shouldAutoFocusOnStart={block.id === firstExerciseId}
                sessionStartTime={sessionStartTime}
                isDraggable={!isSessionActive}
                pendingFocusRequest={pendingFocus && pendingFocus.blockId === block.id ? pendingFocus : null}
                onPendingFocusApplied={() => setPendingFocus(null)}
                onToggle={() => {
                  const nextActiveId = day.activeBlockId === block.id ? null : block.id;
                  onUpdate({ activeBlockId: nextActiveId });
                }}
                onRemove={() => onUpdate({ blocks: day.blocks.filter(b => b.id !== block.id) })}
                onChange={(data) => onUpdate({ blocks: day.blocks.map(b => b.id === block.id ? { ...b, ...data } : b) })}
                goToNextExercise={goToNextExercise}
                openModal={openModal} openConfirm={openConfirm} triggerTimer={triggerTimer}
              />
            </div>
          ))}
          <div className="grid grid-cols-2 gap-2 pt-1">
            <button onClick={() => addBlock('exercise')} className="bg-[#2C2C2E] text-white h-12 rounded-xl flex items-center justify-center gap-2 font-black text-[10px] uppercase active:scale-95 border border-white/5"><Plus size={14} className="text-red-500" /> Упражнение</button>
            <button onClick={() => addBlock('superset')} className="bg-red-600/10 text-red-500 h-12 rounded-xl flex items-center justify-center gap-2 font-black text-[10px] uppercase border border-red-500/20 active:scale-95"><Repeat size={14} /> Суперсет</button>
          </div>
        </div>
      )}
    </div>
  );
}

function BlockItem({ block, isExpanded, onToggle, onRemove, onChange, openModal, openConfirm, triggerTimer, isTimerActive, isSessionActive, isDraggable, shouldAutoFocusOnStart = false, sessionStartTime = null, goToNextExercise = () => {}, pendingFocusRequest = null, onPendingFocusApplied = () => {} }) {
  const [nameEditTrigger, setNameEditTrigger] = useState(0);
  const [focusedSetIdx, setFocusedSetIdx] = useState(0);
  const [isFocusFullscreen, setIsFocusFullscreen] = useState(false);
  const lastAutoFocusStartRef = useRef(null);
  if (block.type === 'superset') return <SupersetBlock block={block} isExpanded={isExpanded} onToggle={onToggle} onRemove={onRemove} onChange={onChange} openModal={openModal} openConfirm={openConfirm} triggerTimer={triggerTimer} isSessionActive={isSessionActive} isDraggable={isDraggable} isTimerActive={isTimerActive} goToNextExercise={goToNextExercise} />;

  const isAllDone = block.setsData?.every(s => s.completed) && block.setsData?.length > 0;
  const activeSetIdx = (block.setsData || []).findIndex(s => !s.completed);
  const safeFocusedSetIdx = Math.min(Math.max(focusedSetIdx, 0), Math.max((block.setsData || []).length - 1, 0));
  const focusedSet = block.setsData?.[safeFocusedSetIdx];

  useEffect(() => {
    if (!isSessionActive) return;
    if (activeSetIdx >= 0) setFocusedSetIdx(activeSetIdx);
  }, [activeSetIdx, isSessionActive]);

  useEffect(() => {
    if (!isSessionActive || !isExpanded) return;
    setFocusedSetIdx(activeSetIdx >= 0 ? activeSetIdx : 0);
  }, [isSessionActive, isExpanded, activeSetIdx]);

  useEffect(() => {
    if (!isSessionActive || !isExpanded) setIsFocusFullscreen(false);
  }, [isSessionActive, isExpanded]);

  useEffect(() => {
    if (isTimerActive) setIsFocusFullscreen(false);
  }, [isTimerActive]);

  useEffect(() => {
    if (!sessionStartTime || !isSessionActive || !isExpanded || !shouldAutoFocusOnStart) return;
    if (lastAutoFocusStartRef.current === sessionStartTime) return;
    setFocusedSetIdx(activeSetIdx >= 0 ? activeSetIdx : 0);
    lastAutoFocusStartRef.current = sessionStartTime;
  }, [sessionStartTime, isSessionActive, isExpanded, shouldAutoFocusOnStart, activeSetIdx]);

  useEffect(() => {
    if (!pendingFocusRequest || !isSessionActive || !isExpanded) return;
    const requestedIdx = Math.min(
      Math.max(pendingFocusRequest.setIdx ?? 0, 0),
      Math.max((block.setsData || []).length - 1, 0)
    );
    setFocusedSetIdx(requestedIdx);
    if (pendingFocusRequest.fullscreen && !isTimerActive) {
      setIsFocusFullscreen(true);
    }
    onPendingFocusApplied();
  }, [pendingFocusRequest, isSessionActive, isExpanded, isTimerActive, block.setsData, onPendingFocusApplied]);

  const goToNextSetOrExercise = () => {
    const nextIncompleteIdx = (block.setsData || []).findIndex((s, idx) => idx > safeFocusedSetIdx && !s.completed);
    if (nextIncompleteIdx !== -1) {
      setFocusedSetIdx(nextIncompleteIdx);
      if (!isTimerActive) setIsFocusFullscreen(true);
      return;
    }
    goToNextExercise(block.id, { setIdx: 0, fullscreen: true });
  };

  const toggleSetComplete = (sIdx, options = {}) => {
    const { onRestComplete = null } = options;
    if (!isSessionActive || (sIdx !== activeSetIdx && !block.setsData[sIdx].completed)) return;
    const set = block.setsData[sIdx];
    const nextSets = [...block.setsData];
    if (set.completed) {
      openConfirm('Сбросить этап?', () => {
        nextSets[sIdx].completed = false;
        onChange({ setsData: nextSets });
      }, 'Сброс');
    } else {
      nextSets[sIdx].completed = true;
      onChange({ setsData: nextSets });
      if (block.restTime !== '0s') {
        triggerTimer(block.restTime || '60s', 'rest', '', onRestComplete);
      } else if (onRestComplete) {
        onRestComplete();
      }
    }
  };

  const handleFocusedSetAction = () => {
    if (!focusedSet) return;
    if (block.mode === 'time' && !focusedSet.completed) {
      triggerTimer(
        focusedSet.value,
        'work',
        block.name,
        () => toggleSetComplete(safeFocusedSetIdx, { onRestComplete: goToNextSetOrExercise }),
        block.prepTime
      );
      return;
    }
    toggleSetComplete(safeFocusedSetIdx, { onRestComplete: goToNextSetOrExercise });
  };

  const adjustFocusedSetValue = (delta) => {
    if (!focusedSet) return;
    const currentRaw = focusedSet.value?.toString() || '0';
    const numericPart = parseInt(currentRaw.replace(/[^\d]/g, ''), 10);
    const baseValue = Number.isNaN(numericPart) ? 0 : numericPart;
    const nextNumeric = Math.max(1, baseValue + delta);
    const nextValue = block.mode === 'time' ? `${nextNumeric}s` : `${nextNumeric}`;
    const nextSets = [...block.setsData];
    nextSets[safeFocusedSetIdx] = { ...nextSets[safeFocusedSetIdx], value: nextValue };
    onChange({ setsData: nextSets });
  };

  const adjustSetsCount = (delta) => {
    const nextCount = Math.max(1, (block.setsData || []).length + delta);
    if (nextCount === block.setsData.length) return;
    let nextSets = [...block.setsData];
    if (delta > 0) {
      for (let i = 0; i < delta; i++) {
        nextSets.push({ id: generateId(), value: nextSets[nextSets.length - 1]?.value || '10', weight: nextSets[nextSets.length - 1]?.weight || '0', completed: false });
      }
    } else {
      nextSets = nextSets.slice(0, nextCount);
    }
    onChange({ setsData: nextSets });
  };

  const toggleMode = () => {
    const newMode = block.mode === 'reps' ? 'time' : 'reps';
    const nextSets = block.setsData.map(set => {
      let val = set.value.toString().replace(/[sm]/g, '');
      if (newMode === 'time' && !isNaN(val) && val !== "") val = val + 's';
      return { ...set, value: val };
    });
    onChange({ mode: newMode, setsData: nextSets });
  };

  const renderFocusedSetCard = () => {
    if (!focusedSet) return null;
    return (
      <div className="fixed inset-0 z-[220] bg-[#FF3B30] text-white flex flex-col items-center justify-center p-6">
        <button
          onClick={() => setIsFocusFullscreen(false)}
          className="absolute top-6 right-6 w-12 h-12 rounded-full bg-black/20 text-white/80 flex items-center justify-center active:scale-95"
          title="Закрыть фокус"
        >
          <X size={22} />
        </button>

        <span className="text-[10px] font-black uppercase tracking-[0.3em] opacity-80 mb-2 italic">ФОКУС</span>
        <div className="text-2xl font-black uppercase italic tracking-wide mb-2 text-center">{block.name}</div>
        <div className="flex flex-wrap items-center justify-center gap-2 mb-6">
          {(block.setsData || []).map((_, setIdx) => {
            const isActiveSet = setIdx === safeFocusedSetIdx;
            return (
              <button
                key={`focus-set-${setIdx}`}
                onClick={() => setFocusedSetIdx(setIdx)}
                className={`px-3 py-1.5 rounded-full text-[11px] font-black uppercase italic tracking-[0.08em] transition-all active:scale-95 ${
                  isActiveSet
                    ? 'bg-white text-[#FF3B30]'
                    : 'bg-black/25 border border-white/20 text-white/85'
                }`}
              >
                {`set ${setIdx + 1}`}
              </button>
            );
          })}
        </div>

        <div className="text-9xl font-black tabular-nums tracking-tighter leading-none italic mb-16">
          {focusedSet.value}{block.mode === 'time' && !focusedSet.value.toString().includes('s') ? 's' : ''}
        </div>

        <div className="flex items-center gap-4 mb-10">
          <button
            onClick={() => adjustFocusedSetValue(-1)}
            className="w-14 h-14 rounded-full bg-black/25 border border-white/10 flex items-center justify-center active:scale-95"
            title={block.mode === 'time' ? 'Уменьшить время' : 'Уменьшить повторы'}
          >
            <Minus size={24} />
          </button>
          <button
            onClick={() => adjustFocusedSetValue(1)}
            className="w-14 h-14 rounded-full bg-black/25 border border-white/10 flex items-center justify-center active:scale-95"
            title={block.mode === 'time' ? 'Увеличить время' : 'Увеличить повторы'}
          >
            <Plus size={24} />
          </button>
        </div>

        <button
          onClick={handleFocusedSetAction}
          className={`w-24 h-24 rounded-full flex items-center justify-center shadow-2xl active:scale-95 ${focusedSet.completed ? 'bg-[#32D74B]' : 'bg-black/30'}`}
        >
          <Check size={40} className={focusedSet.completed ? 'text-black stroke-[3px]' : 'text-white'} />
        </button>
      </div>
    );
  };

  return (
    <div className={`rounded-[28px] transition-all duration-300 overflow-hidden relative ${isExpanded ? 'bg-[#3A3A3C] shadow-lg' : 'bg-[#2C2C2E] border border-white/5'} ${isSessionActive && !isExpanded && !isAllDone ? 'opacity-80' : 'opacity-100'}`}>

      {!isSessionActive && (
        <button
          onClick={(e) => { e.stopPropagation(); onRemove(); }}
          className="absolute top-2 right-2 p-2.5 text-[#48484A] hover:text-red-500 active:scale-90 transition-all z-[20]"
        >
          <Trash2 size={20} />
        </button>
      )}

      <div onClick={onToggle} className="flex items-center justify-between p-3.5 cursor-pointer">
        <div className="flex items-start gap-3.5 flex-1 overflow-hidden">
          {isDraggable && (
             <div className="pt-2.5 cursor-grab active:cursor-grabbing text-[#48484A] hover:text-white transition-colors">
               <GripVertical size={20} />
             </div>
          )}
          <div className="flex flex-col gap-1.5 items-center">
            <div className={`w-10 h-10 rounded-xl flex items-center justify-center transition-all ${isAllDone ? 'bg-[#32D74B] text-black shadow-md' : 'bg-red-600/10 text-red-500'}`}>
              {isAllDone ? <Check size={18} strokeWidth={4} /> : <Activity size={18} />}
            </div>
            {isExpanded && (
              <div className="flex gap-1.5">
                <button
                  onClick={(e) => { e.stopPropagation(); onChange({ isSettingsOpen: !block.isSettingsOpen }); }}
                  className={`w-10 h-10 rounded-xl flex items-center justify-center transition-all animate-in zoom-in-50 duration-200 ${block.isSettingsOpen ? 'bg-[#32D74B] text-black shadow-md' : 'bg-[#32D74B]/10 text-[#32D74B]'}`}
                >
                  <Settings2 size={18} />
                </button>
                <button
                  onClick={(e) => { e.stopPropagation(); setNameEditTrigger(v => v + 1); }}
                  className="w-10 h-10 rounded-xl flex items-center justify-center transition-all animate-in zoom-in-50 duration-200 bg-white/5 text-white border border-white/10"
                  title="Редактировать название"
                >
                  <Pencil size={16} />
                </button>
              </div>
            )}
          </div>

          <div className="flex-1 min-0 flex flex-col h-10 justify-end">
             <div className="flex items-baseline overflow-hidden pb-0.5">
               <SmartInput
                 value={block.name}
                 defaultValue="Новое упражнение"
                 onClick={(e) => e.stopPropagation()}
                 onChange={(e) => onChange({ name: e.target.value })}
                 allowInlineEdit={false}
                 editTrigger={nameEditTrigger}
                 className="font-black text-white outline-none flex-1 min-w-0 bg-transparent truncate text-xl uppercase italic tracking-tighter"
                 placeholder="Exercise Name"
               />
             </div>
          </div>
        </div>
        <div className="w-6" />
      </div>

      {isExpanded && (
        <div className="p-3.5 pt-0 space-y-4">
          {block.isSettingsOpen && (
            <div className="bg-black/40 rounded-[20px] p-3 space-y-3 border border-white/5 animate-in fade-in slide-in-from-top-2">
              <div className="flex gap-2">
                <button onClick={() => openModal('Пауза', QUICK_TIME, block.restTime, (v) => onChange({ restTime: v }), false)} className="flex-1 py-2 rounded-xl text-[9px] font-black uppercase bg-black/30 text-orange-500 border border-orange-500/20">Rest: {block.restTime}</button>
                <button onClick={() => openModal('Внимание', PREP_OPTIONS, block.prepTime, (v) => onChange({ prepTime: v }), false)} className="flex-1 py-2 rounded-xl text-[9px] font-black uppercase bg-black/30 text-red-500 border border-red-500/20">Prep: {block.prepTime}</button>
              </div>
              <div className="flex items-center justify-between p-1 px-2">
                <span className="text-[9px] font-black uppercase text-[#8E8E93] italic tracking-widest">Sets:</span>
                <div className="flex items-center gap-3">
                  <button onClick={() => adjustSetsCount(-1)} className="w-8 h-8 bg-[#2C2C2E] rounded-lg flex items-center justify-center active:scale-90"><Minus size={14} /></button>
                  <span className="font-black text-white text-base w-5 text-center italic tabular-nums">{block.setsData.length}</span>
                  <button onClick={() => adjustSetsCount(1)} className="w-8 h-8 bg-[#32D74B]/20 text-[#32D74B] rounded-lg flex items-center justify-center active:scale-90 border border-[#32D74B]/20"><Plus size={14} /></button>
                </div>
              </div>
            </div>
          )}

          {!isSessionActive ? (
            <div className="overflow-x-auto no-scrollbar -mx-3 px-3">
               <div className="flex gap-4 min-w-max pb-2">
                  {block.setsData.map((set, sIdx) => {
                    const isHighlighted = activeSetIdx === sIdx;
                    const isDone = set.completed;
                    const isFuture = sIdx > activeSetIdx && activeSetIdx !== -1;
                    const isTime = block.mode === 'time';
                    return (
                      <div key={set.id} className={`flex flex-col gap-2.5 min-w-[110px]`}>
                         <span className={`text-[9px] font-black uppercase text-center italic tracking-widest transition-colors ${!isSessionActive ? 'text-[#48484A]' : (isDone ? 'text-[#32D74B]' : (isHighlighted ? 'text-red-500' : 'text-[#48484A]'))}`}>Set {sIdx + 1}</span>
                         <div className="flex items-center gap-1.5 h-12">
                            {sIdx === 0 && (
                              <button onClick={toggleMode} className={`w-10 h-10 rounded-xl flex items-center justify-center transition-all shrink-0 ${isTime ? 'bg-orange-500 text-black shadow-md' : 'bg-white/5 text-orange-500 border border-white/5'}`}>
                                {isTime ? <Timer size={18} /> : <Hash size={18} />}
                              </button>
                            )}
                            <SwipeableCell isSessionActive={isSessionActive} canSwipe={isTime} isDone={isDone} onSwipeRight={() => triggerTimer(set.value, 'work', block.name, () => toggleSetComplete(sIdx, { onRestComplete: goToNextSetOrExercise }), block.prepTime)} isHighlighted={isHighlighted}>
                              <div onClick={() => !isDone && openModal(block.mode === 'reps' ? 'REPS' : 'TIME', block.mode === 'reps' ? QUICK_REPS : QUICK_TIME, set.value, (v, weight) => {
                                const next = [...block.setsData]; next[sIdx] = {...next[sIdx], value: v, weight: weight}; onChange({setsData: next});
                              }, true, set.weight)} className={`h-full flex flex-col items-center justify-center cursor-pointer transition-colors ${isDone ? 'bg-[#32D74B]/10' : 'bg-black/30 border border-white/5'} ${isSessionActive && isFuture ? 'opacity-40' : 'opacity-100'}`}>
                                 <span className={`font-black text-base tabular-nums italic transition-colors ${isDone ? 'text-[#32D74B]' : (isSessionActive && !isHighlighted ? 'text-white/40' : 'text-white')}`}>{set.value}{isTime && !set.value.toString().includes('s') ? 's' : ''}</span>
                                 {parseFloat(set.weight) > 0 && <span className={`text-[7px] font-black mt-0.5 italic text-red-500 uppercase transition-opacity ${isSessionActive && !isHighlighted && !isDone ? 'opacity-30' : 'opacity-100'}`}>{set.weight} kg</span>}
                              </div>
                            </SwipeableCell>
                         </div>
                         <button
                           disabled={!isSessionActive || (isFuture && !isDone)}
                           onClick={() => toggleSetComplete(sIdx, { onRestComplete: goToNextSetOrExercise })}
                           className={`w-full h-10 rounded-[16px] flex items-center justify-center transition-all relative
                             ${isDone ? 'bg-[#32D74B]/20 text-[#32D74B] ring-2 ring-[#32D74B] ring-inset opacity-100' :
                               (isSessionActive && isHighlighted) ? 'bg-black/50 text-red-500 ring-2 ring-red-500 ring-inset shadow-[0_0_10px_rgba(255,59,48,0.2)] opacity-100 active:scale-95' :
                               'bg-black/40 border border-white/10 text-white/20'}
                             ${(!isSessionActive || (isFuture && !isDone)) ? 'cursor-not-allowed' : ''}`}
                         >
                           {isDone ? <Check size={24} className="stroke-[4px]" /> :
                            (!isSessionActive) ? <Lock size={14} className="opacity-40" /> :
                            (isFuture) ? <Lock size={14} className="opacity-20" /> :
                            <Check size={24} className={isHighlighted ? 'opacity-100' : 'opacity-20'} />}
                         </button>
                      </div>
                    );
                  })}
               </div>
            </div>
          ) : (
            <div className="space-y-3">
              <div className="flex items-center gap-2 overflow-x-auto no-scrollbar pb-1">
                {block.setsData.map((set, sIdx) => {
                  const isDone = set.completed;
                  const isActiveTab = sIdx === safeFocusedSetIdx;
                  return (
                    <button
                      key={set.id}
                      onClick={() => {
                        setFocusedSetIdx(sIdx);
                        if (!isTimerActive) setIsFocusFullscreen(true);
                      }}
                      className={`min-w-[82px] h-8 px-2 rounded-t-xl border-t-2 border-x-2 font-black text-[11px] uppercase italic tracking-wide transition-all ${isDone ? 'border-[#32D74B] text-[#32D74B] bg-[#32D74B]/10' : isActiveTab ? 'border-red-500 text-red-500 bg-red-500/10' : 'border-white/15 text-[#8E8E93] bg-black/25'}`}
                    >
                      Set {sIdx + 1}
                    </button>
                  );
                })}
              </div>

              {isFocusFullscreen && focusedSet && renderFocusedSetCard()}
            </div>
          )}
        </div>
      )}
    </div>
  );
}

function SupersetBlock({ block, isExpanded, onToggle, onRemove, onChange, openModal, openConfirm, triggerTimer, isSessionActive, isDraggable, isTimerActive, goToNextExercise = () => {} }) {
  const [nameEditTrigger, setNameEditTrigger] = useState(0);
  const [focusedRoundIdx, setFocusedRoundIdx] = useState(0);
  const [isFocusFullscreen, setIsFocusFullscreen] = useState(false);
  const [startedFromFocus, setStartedFromFocus] = useState(false);
  const [focusDismissedManually, setFocusDismissedManually] = useState(false);
  const [roundFlowState, setRoundFlowState] = useState({});
  const isBlockDone = block.completedRounds?.length === block.rounds;
  const activeRoundIdx = Array.from({ length: block.rounds }).findIndex((_, i) => !(block.completedRounds || []).includes(i));
  const safeFocusedRoundIdx = Math.min(Math.max(focusedRoundIdx, 0), Math.max(block.rounds - 1, 0));
  const focusedRoundDone = (block.completedRounds || []).includes(safeFocusedRoundIdx);
  const timedExerciseIndexes = (block.exercises || [])
    .map((ex, idx) => (ex.mode === 'time' ? idx : -1))
    .filter((idx) => idx !== -1);
  const roundExerciseCompletion = Array.isArray(block.roundExerciseCompletion) ? block.roundExerciseCompletion : [];

  const updateRoundExerciseCompletion = (roundIdx, updater) => {
    const nextCompletion = [...roundExerciseCompletion];
    const currentRoundCompletion = { ...(nextCompletion[roundIdx] || {}) };
    nextCompletion[roundIdx] = updater(currentRoundCompletion);
    onChange({ roundExerciseCompletion: nextCompletion });
  };

  useEffect(() => {
    if (!isSessionActive) return;
    if (activeRoundIdx >= 0) setFocusedRoundIdx(activeRoundIdx);
  }, [activeRoundIdx, isSessionActive]);

  useEffect(() => {
    if (!isSessionActive || !isExpanded) return;
    setFocusedRoundIdx(activeRoundIdx >= 0 ? activeRoundIdx : 0);
  }, [isSessionActive, isExpanded, activeRoundIdx]);

  useEffect(() => {
    if (!isSessionActive || !isExpanded) {
      setIsFocusFullscreen(false);
      setStartedFromFocus(false);
      setFocusDismissedManually(false);
    }
  }, [isSessionActive, isExpanded]);

  useEffect(() => {
    if (isTimerActive && startedFromFocus && isFocusFullscreen) {
      setIsFocusFullscreen(false);
    }
  }, [isTimerActive, startedFromFocus, isFocusFullscreen]);

  useEffect(() => {
    if (!isSessionActive) {
      setRoundFlowState({});
      return;
    }
    setRoundFlowState((prev) => {
      const next = {};
      for (let rIdx = 0; rIdx < block.rounds; rIdx++) {
        if ((block.completedRounds || []).includes(rIdx)) continue;
        const firstTimedIdx = timedExerciseIndexes[0] ?? -1;
        const current = prev[rIdx];
        next[rIdx] = {
          nextTimedIdx: current?.nextTimedIdx ?? firstTimedIdx,
          awaitingConfirm: current?.awaitingConfirm ?? false
        };
      }
      return next;
    });
  }, [isSessionActive, block.rounds, block.completedRounds, timedExerciseIndexes.join(',')]);

  const goToNextRoundOrExercise = (rIdx) => {
    const nextRoundIdx = Array.from({ length: block.rounds }).findIndex((_, idx) => idx > rIdx && !(block.completedRounds || []).includes(idx));
    if (nextRoundIdx !== -1) {
      setFocusedRoundIdx(nextRoundIdx);
      setIsFocusFullscreen(true);
      setFocusDismissedManually(false);
      return;
    }
    goToNextExercise(block.id, { setIdx: 0, fullscreen: true });
  };

  const toggleRoundComplete = (rIdx, options = {}) => {
    const { onRestComplete = null } = options;
    if (!isSessionActive || (rIdx !== activeRoundIdx && !(block.completedRounds || []).includes(rIdx))) return;
    const isCompleted = (block.completedRounds || []).includes(rIdx);
    if (isCompleted) {
      setRoundFlowState((prev) => {
        const firstTimedIdx = timedExerciseIndexes[0] ?? -1;
        return { ...prev, [rIdx]: { nextTimedIdx: firstTimedIdx, awaitingConfirm: false } };
      });
      openConfirm('Сбросить круг?', () => {
        const nextCompletion = [...roundExerciseCompletion];
        nextCompletion[rIdx] = {};
        onChange({
          completedRounds: block.completedRounds.filter(r => r !== rIdx),
          roundExerciseCompletion: nextCompletion
        });
      }, 'Сброс');
    } else {
      setRoundFlowState((prev) => {
        const next = { ...prev };
        delete next[rIdx];
        return next;
      });
      onChange({ completedRounds: [...(block.completedRounds || []), rIdx] });
      if (block.restTime !== '0s') {
        triggerTimer(block.restTime || '60s', 'rest', '', onRestComplete);
      } else if (onRestComplete) {
        onRestComplete();
      }
    }
  };

  const adjustRounds = (delta) => {
    const nextCount = Math.max(1, block.rounds + delta);
    if (nextCount === block.rounds) return;
    let newValues = [...block.values];
    if (delta > 0) {
      for(let i = 0; i < delta; i++) {
        const roundMap = {};
        block.exercises.forEach(ex => roundMap[ex.id] = { value: '10', weight: '0' });
        newValues.push(roundMap);
      }
    } else {
      newValues = newValues.slice(0, nextCount);
    }
    onChange({
      rounds: nextCount,
      values: newValues,
      completedRounds: (block.completedRounds || []).filter(r => r < nextCount),
      roundExerciseCompletion: roundExerciseCompletion.slice(0, nextCount)
    });
  };

  const adjustExerciseCount = (delta) => {
    const nextCount = Math.max(1, block.exercises.length + delta);
    if (nextCount === block.exercises.length) return;
    if (delta > 0) {
      const newExId = generateId();
      const newExercises = [...block.exercises, { id: newExId, name: 'Отжимания', mode: 'reps' }];
      const newValues = block.values.map(v => ({ ...v, [newExId]: { value: '10', weight: '0' } }));
      onChange({ exercises: newExercises, values: newValues });
    } else {
      const lastExId = block.exercises[block.exercises.length - 1].id;
      const newExercises = block.exercises.slice(0, -1);
      const newValues = block.values.map(v => {
        const nextV = { ...v };
        delete nextV[lastExId];
        return nextV;
      });
      const nextCompletion = roundExerciseCompletion.map((roundMap) => {
        const updatedRoundMap = { ...(roundMap || {}) };
        delete updatedRoundMap[lastExId];
        return updatedRoundMap;
      });
      onChange({ exercises: newExercises, values: newValues, roundExerciseCompletion: nextCompletion });
    }
  };

  const toggleExerciseMode = (exId) => {
    const targetEx = block.exercises.find(e => e.id === exId);
    if (!targetEx) return;
    const newMode = targetEx.mode === 'reps' ? 'time' : 'reps';
    const nextExercises = block.exercises.map(e => e.id === exId ? { ...e, mode: newMode } : e);
    const nextValues = block.values.map(roundMap => {
      const cell = roundMap[exId] || { value: '10', weight: '0' };
      let val = cell.value.toString().replace(/[sm]/g, '');
      if (newMode === 'time' && !isNaN(val) && val !== "") val = val + 's';
      return { ...roundMap, [exId]: { ...cell, value: val } };
    });
    onChange({ exercises: nextExercises, values: nextValues });
  };

  const renderFocusedRoundCard = () => {
    const canEditRound = !focusedRoundDone;
    const hasTimedExercises = timedExerciseIndexes.length > 0;
    const roundState = roundFlowState[safeFocusedRoundIdx] || {
      nextTimedIdx: timedExerciseIndexes[0] ?? -1,
      awaitingConfirm: false
    };
    const isAwaitingRoundConfirm = roundState.awaitingConfirm;
    const nextTimedIdx = roundState.nextTimedIdx;

    const runTimedExercise = (roundIdx, exIdx) => {
      const timedExercise = block.exercises?.[exIdx];
      if (!timedExercise) return;
      const timedValue = block.values[roundIdx]?.[timedExercise.id]?.value || '10s';

      triggerTimer(
        timedValue,
        'work',
        timedExercise.name || block.name,
        () => {
          const followingTimedIdx = timedExerciseIndexes.find((idx) => idx > exIdx);
          const hasNonTimedExercises = (block.exercises || []).some((exercise) => exercise.mode !== 'time');
          if (followingTimedIdx !== undefined) {
            if (followingTimedIdx === exIdx + 1) {
              runTimedExercise(roundIdx, followingTimedIdx);
              return;
            }
            setRoundFlowState((prev) => ({
              ...prev,
              [roundIdx]: { nextTimedIdx: followingTimedIdx, awaitingConfirm: false }
            }));
            return;
          }

          if (hasNonTimedExercises) {
            setRoundFlowState((prev) => ({
              ...prev,
              [roundIdx]: { nextTimedIdx: -1, awaitingConfirm: true }
            }));
            if (startedFromFocus && !focusDismissedManually) {
              setIsFocusFullscreen(true);
            }
            setStartedFromFocus(false);
            return;
          }

          setStartedFromFocus(false);
          toggleRoundComplete(roundIdx, { onRestComplete: () => goToNextRoundOrExercise(roundIdx) });
        },
        block.prepTime || '0s'
      );
    };

    const handleFocusedRoundAction = () => {
      if (focusedRoundDone) {
        toggleRoundComplete(safeFocusedRoundIdx);
        return;
      }
      if (hasTimedExercises) {
        if (isAwaitingRoundConfirm || nextTimedIdx === -1) {
          toggleRoundComplete(safeFocusedRoundIdx, { onRestComplete: () => goToNextRoundOrExercise(safeFocusedRoundIdx) });
          return;
        }
        const completedRepExerciseIdsBeforeTimed = (block.exercises || [])
          .slice(0, nextTimedIdx)
          .filter((exercise) => exercise.mode === 'reps')
          .map((exercise) => exercise.id);
        if (completedRepExerciseIdsBeforeTimed.length) {
          updateRoundExerciseCompletion(safeFocusedRoundIdx, (currentRoundCompletion) => {
            const nextRoundCompletion = { ...currentRoundCompletion };
            completedRepExerciseIdsBeforeTimed.forEach((exerciseId) => {
              nextRoundCompletion[exerciseId] = true;
            });
            return nextRoundCompletion;
          });
        }
        setStartedFromFocus(isFocusFullscreen && !focusDismissedManually);
        runTimedExercise(safeFocusedRoundIdx, nextTimedIdx);
        return;
      }
      toggleRoundComplete(safeFocusedRoundIdx, { onRestComplete: () => goToNextRoundOrExercise(safeFocusedRoundIdx) });
    };

    return (
      <div className="fixed inset-0 z-[220] bg-[#2A2424] text-white flex flex-col items-center justify-center p-6">
        <button
          onClick={() => {
            setFocusDismissedManually(true);
            setIsFocusFullscreen(false);
          }}
          className="absolute top-6 right-6 w-12 h-12 rounded-full bg-black/25 text-white/80 flex items-center justify-center active:scale-95"
          title="Закрыть фокус"
        >
          <X size={22} />
        </button>

        <span className="text-[10px] font-black uppercase tracking-[0.3em] opacity-80 mb-2 italic">ФОКУС</span>
        <div className="text-2xl font-black uppercase italic tracking-wide mb-2 text-center">{block.name}</div>
        <div className="flex flex-wrap items-center justify-center gap-2 mb-6">
          {Array.from({ length: block.rounds }).map((_, rIdx) => {
            const isActiveRound = rIdx === safeFocusedRoundIdx;
            return (
              <button
                key={`focus-round-${rIdx}`}
                onClick={() => setFocusedRoundIdx(rIdx)}
                className={`px-3 py-1.5 rounded-full text-[11px] font-black uppercase italic tracking-[0.08em] transition-all active:scale-95 ${
                  isActiveRound ? 'bg-white text-[#2A2424]' : 'bg-black/25 border border-white/20 text-white/85'
                }`}
              >
                {`round ${rIdx + 1}`}
              </button>
            );
          })}
        </div>

        <div className="w-full max-w-sm space-y-3 mb-10">
          {(block.exercises || []).map((ex) => {
            const cellData = block.values[safeFocusedRoundIdx]?.[ex.id] || { value: '10', weight: '0' };
            const val = cellData.value || '10';
            const wt = cellData.weight || '0';
            const isTime = ex.mode === 'time';
            const isExerciseCompleted = !!roundExerciseCompletion[safeFocusedRoundIdx]?.[ex.id];
            return (
              <button
                key={`focus-ex-${ex.id}`}
                onClick={() => canEditRound && openModal(ex.name || 'Exercise', isTime ? QUICK_TIME : QUICK_REPS, val, (v, weight) => {
                  const nextValues = [...block.values];
                  nextValues[safeFocusedRoundIdx] = { ...nextValues[safeFocusedRoundIdx], [ex.id]: { value: v, weight: weight } };
                  onChange({ values: nextValues });
                }, true, wt)}
                className={`w-full rounded-2xl p-4 border transition-all text-left ${
                  focusedRoundDone || isExerciseCompleted
                    ? 'bg-[#32D74B]/10 border-[#32D74B]/40'
                    : 'bg-black/25 border-white/10 active:scale-[0.99]'
                }`}
              >
                <div className="flex items-center justify-between gap-3 mb-1">
                  <div className="text-[10px] font-black uppercase italic tracking-widest text-[#8E8E93] truncate">{ex.name}</div>
                  {isExerciseCompleted && !focusedRoundDone && (
                    <Check size={14} className="text-[#32D74B] shrink-0" />
                  )}
                </div>
                <div className="flex items-end gap-2">
                  <span className={`font-black text-4xl tabular-nums italic ${focusedRoundDone || isExerciseCompleted ? 'text-[#32D74B]' : 'text-white'}`}>{val}{isTime && !val.toString().includes('s') ? 's' : ''}</span>
                  {parseFloat(wt) > 0 && <span className="text-[11px] font-black mb-1 italic uppercase text-red-500">{wt} kg</span>}
                </div>
              </button>
            );
          })}
        </div>

        <button
          onClick={handleFocusedRoundAction}
          className={`w-24 h-24 rounded-full flex items-center justify-center shadow-2xl active:scale-95 ${focusedRoundDone ? 'bg-[#32D74B]' : 'bg-black/35'}`}
        >
          {focusedRoundDone ? (
            <Check size={40} className="text-black stroke-[3px]" />
          ) : hasTimedExercises && !isAwaitingRoundConfirm ? (
            <Play size={38} className="text-white fill-white translate-x-[2px]" />
          ) : (
            <Check size={40} className="text-white" />
          )}
        </button>
      </div>
    );
  };

  return (
    <div className={`rounded-[28px] transition-all duration-300 overflow-hidden relative ${isExpanded ? 'bg-[#2A2424] shadow-lg' : 'bg-[#2C2C2E] border border-red-500/20'}`}>

      {!isSessionActive && (
        <button
          onClick={(e) => { e.stopPropagation(); onRemove(); }}
          className="absolute top-2 right-2 p-2.5 text-[#48484A] hover:text-red-500 active:scale-90 transition-all z-[20]"
        >
          <Trash2 size={20} />
        </button>
      )}

      <div onClick={onToggle} className="flex items-center justify-between p-3.5 cursor-pointer">
        <div className="flex items-start gap-3.5 flex-1 overflow-hidden">
          {isDraggable && (
             <div className="pt-2.5 cursor-grab active:cursor-grabbing text-[#48484A] hover:text-white transition-colors">
               <GripVertical size={20} />
             </div>
          )}
          <div className="flex flex-col gap-1.5 items-center">
            <div className={`w-10 h-10 rounded-xl flex items-center justify-center transition-all ${isBlockDone ? 'bg-[#32D74B] text-black shadow-md' : 'bg-red-600 text-white shadow-md'}`}>
              <Repeat size={18} />
            </div>
            {isExpanded && (
              <div className="flex gap-1.5">
                <button
                  onClick={(e) => { e.stopPropagation(); onChange({ isSettingsOpen: !block.isSettingsOpen }); }}
                  className={`w-10 h-10 rounded-xl flex items-center justify-center transition-all animate-in zoom-in-50 duration-200 ${block.isSettingsOpen ? 'bg-[#32D74B] text-black shadow-md' : 'bg-[#32D74B]/10 text-[#32D74B]'}`}
                >
                  <Settings2 size={18} />
                </button>
                <button
                  onClick={(e) => { e.stopPropagation(); setNameEditTrigger(v => v + 1); }}
                  className="w-10 h-10 rounded-xl flex items-center justify-center transition-all animate-in zoom-in-50 duration-200 bg-white/5 text-white border border-white/10"
                  title="Редактировать название"
                >
                  <Pencil size={16} />
                </button>
              </div>
            )}
          </div>

          <div className="flex-1 min-0 flex flex-col h-10 justify-end">
             <div className="flex items-baseline overflow-hidden pb-0.5">
               <SmartInput
                 value={block.name}
                 defaultValue="Новый суперсет"
                 onClick={(e) => e.stopPropagation()}
                 onChange={(e) => onChange({ name: e.target.value })}
                 allowInlineEdit={false}
                 editTrigger={nameEditTrigger}
                 className="font-black text-white outline-none flex-1 min-w-0 bg-transparent truncate text-xl uppercase italic tracking-tighter"
                 placeholder="Superset Name"
               />
             </div>
          </div>
        </div>
        <div className="w-6" />
      </div>

      {isExpanded && (
        <div className="p-3.5 pt-0 space-y-3.5">
          {block.isSettingsOpen && (
            <div className="bg-black/40 rounded-[20px] p-3 space-y-3 border border-red-500/10 animate-in fade-in slide-in-from-top-2">
              <div className="flex gap-2">
                <button onClick={() => openModal('Пауза', QUICK_TIME, block.restTime, (v) => onChange({ restTime: v }), false)} className="flex-1 py-2 rounded-xl text-[9px] font-black uppercase bg-black/30 text-orange-500 border border-orange-500/20">Rest: {block.restTime}</button>
                <button onClick={() => openModal('Внимание', PREP_OPTIONS, block.prepTime, (v) => onChange({ prepTime: v }), false)} className="flex-1 py-2 rounded-xl text-[9px] font-black uppercase bg-black/30 text-red-500 border border-red-500/20">Prep: {block.prepTime}</button>
              </div>
              <div className="space-y-2">
                <div className="flex items-center justify-between px-1">
                  <span className="text-[9px] font-black uppercase italic text-[#8E8E93] tracking-widest">Rounds:</span>
                  <div className="flex items-center gap-3">
                    <button onClick={() => adjustRounds(-1)} className="w-8 h-8 bg-[#2C2C2E] rounded-lg flex items-center justify-center text-white"><Minus size={14} /></button>
                    <span className="font-black text-white text-base w-5 text-center italic tabular-nums">{block.rounds}</span>
                    <button onClick={() => adjustRounds(1)} className="w-8 h-8 bg-[#32D74B]/20 text-[#32D74B] rounded-lg flex items-center justify-center border border-[#32D74B]/20"><Plus size={14} /></button>
                  </div>
                </div>
                <div className="flex items-center justify-between px-1">
                  <span className="text-[9px] font-black uppercase italic text-[#8E8E93] tracking-widest">Exercises:</span>
                  <div className="flex items-center gap-3">
                    <button onClick={() => adjustExerciseCount(-1)} className="w-8 h-8 bg-[#2C2C2E] rounded-lg flex items-center justify-center text-white"><Minus size={14} /></button>
                    <span className="font-black text-white text-base w-5 text-center italic tabular-nums">{block.exercises.length}</span>
                    <button onClick={() => adjustExerciseCount(1)} className="w-8 h-8 bg-[#32D74B]/20 text-[#32D74B] rounded-lg flex items-center justify-center border border-[#32D74B]/20"><Plus size={14} /></button>
                  </div>
                </div>
              </div>
            </div>
          )}

          {!isSessionActive ? (
            <div className="overflow-x-auto no-scrollbar -mx-4 px-4 pt-1">
              <div className="flex gap-4 min-w-max pb-2">
                {Array.from({ length: block.rounds }).map((_, rIdx) => {
                  const isRoundDone = (block.completedRounds || []).includes(rIdx);
                  const isHighlighted = activeRoundIdx === rIdx;
                  const isFuture = rIdx > activeRoundIdx && activeRoundIdx !== -1;
                  return (
                    <div key={rIdx} className={`flex flex-col gap-5 min-w-[130px]`}>
