                      <span className={`text-[10px] font-black uppercase text-center italic tracking-widest transition-colors ${!isSessionActive ? 'text-[#48484A]' : (isRoundDone ? 'text-[#32D74B]' : (isHighlighted ? 'text-red-500' : 'text-[#48484A]'))}`}>Round {rIdx + 1}</span>
                      <div className="flex flex-col gap-4">
                        {block.exercises?.map((ex) => {
                          const cellData = block.values[rIdx]?.[ex.id] || { value: '10', weight: '0' };
                          const val = cellData.value || '10';
                          const wt = cellData.weight || '0';
                          const isTime = ex.mode === 'time';
                          return (
                            <div key={ex.id} className="space-y-1.5">
                              <SmartInput
                                value={ex.name}
                                defaultValue="Новое упр"
                                onChange={(e) => onChange({ exercises: block.exercises.map(e_ => e_.id === ex.id ? { ...e_, name: e.target.value } : e_) })}
                                className={`text-[8px] font-black transition-colors truncate uppercase bg-transparent outline-none w-full italic focus:text-red-500 ${isSessionActive && isHighlighted ? 'text-[#8E8E93]' : (isSessionActive ? 'text-[#48484A]' : 'text-[#8E8E93]')}`}
                                placeholder="Exercise"
                              />
                              <div className="flex items-center gap-1.5 h-12">
                                 {rIdx === 0 && (
                                    <button onClick={() => toggleExerciseMode(ex.id)} className={`w-10 h-10 rounded-xl flex items-center justify-center transition-all shrink-0 ${isTime ? 'bg-orange-500 text-black shadow-md' : 'bg-white/5 text-orange-500 border border-white/5'}`}>
                                      {isTime ? <Timer size={18} /> : <Hash size={18} />}
                                    </button>
                                 )}
                                  <SwipeableCell isSessionActive={isSessionActive} canSwipe={isTime} isDone={isRoundDone} onSwipeRight={() => triggerTimer(val, 'work', ex.name, null, block.prepTime)} isHighlighted={isHighlighted}>
                                    <div onClick={() => !isRoundDone && openModal('Round '+(rIdx+1), isTime ? QUICK_TIME : QUICK_REPS, val, (v, weight) => {
                                      let nv = [...block.values];
                                      nv[rIdx] = { ...nv[rIdx], [ex.id]: { value: v, weight: weight } };
                                      onChange({ values: nv });
                                    }, true, wt)} className={`h-full flex flex-col items-center justify-center transition-colors ${isRoundDone ? 'bg-[#32D74B]/10' : 'bg-black/30 border border-white/5'} ${isSessionActive && isFuture ? 'opacity-40' : 'opacity-100'}`}>
                                      <span className={`font-black text-base tabular-nums italic transition-colors ${isRoundDone ? 'text-[#32D74B]' : (isSessionActive && !isHighlighted ? 'text-white/40' : 'text-white')}`}>{val}{isTime && !val.toString().includes('s') ? 's' : ''}</span>
                                      {parseFloat(wt) > 0 && <span className={`text-[7px] font-black mt-0.5 italic uppercase text-red-500 transition-opacity ${isSessionActive && !isHighlighted && !isRoundDone ? 'opacity-30' : 'opacity-100'}`}>{wt} kg</span>}
                                    </div>
                                  </SwipeableCell>
                              </div>
                            </div>
                          );
                        })}
                      </div>
                      <div className="pt-2 mt-auto border-t border-white/10">
                        <button
                          disabled={!isSessionActive || (isFuture && !isRoundDone)}
                          onClick={() => toggleRoundComplete(rIdx, { onRestComplete: () => goToNextRoundOrExercise(rIdx) })}
                          className={`w-full h-11 rounded-[16px] flex items-center justify-center transition-all relative
                            ${isRoundDone ? 'bg-[#32D74B]/20 text-[#32D74B] ring-2 ring-[#32D74B] ring-inset opacity-100' :
                              (isSessionActive && isHighlighted) ? 'bg-black/50 text-red-500 ring-2 ring-red-500 ring-inset shadow-[0_0_15px_rgba(255,59,48,0.2)] opacity-100 active:scale-95' :
                              'bg-black/40 border border-white/10 text-white/20'}
                            ${(!isSessionActive || (isFuture && !isRoundDone)) ? 'cursor-not-allowed' : ''}`}
                        >
                           {isRoundDone ? <Check size={26} className="stroke-[4px]" /> :
                            (!isSessionActive) ? <Lock size={16} className="opacity-40" /> :
                            (isFuture) ? <Lock size={16} className="opacity-20" /> :
                            <Check size={26} className={isHighlighted ? 'opacity-100' : 'opacity-20'} />}
                        </button>
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>
          ) : (
            <div className="space-y-3">
              <div className="flex items-center gap-2 overflow-x-auto no-scrollbar pb-1">
                {Array.from({ length: block.rounds }).map((_, rIdx) => {
                  const isDone = (block.completedRounds || []).includes(rIdx);
                  const isActiveTab = rIdx === safeFocusedRoundIdx;
                  return (
                    <button
                      key={`superset-round-tab-${rIdx}`}
                      onClick={() => {
                        setFocusedRoundIdx(rIdx);
                        setFocusDismissedManually(false);
                        if (!isTimerActive) setIsFocusFullscreen(true);
                      }}
                      className={`min-w-[92px] h-8 px-2 rounded-t-xl border-t-2 border-x-2 font-black text-[11px] uppercase italic tracking-wide transition-all ${isDone ? 'border-[#32D74B] text-[#32D74B] bg-[#32D74B]/10' : isActiveTab ? 'border-red-500 text-red-500 bg-red-500/10' : 'border-white/15 text-[#8E8E93] bg-black/25'}`}
                    >
                      Round {rIdx + 1}
                    </button>
                  );
                })}
              </div>
              {isFocusFullscreen && renderFocusedRoundCard()}
            </div>
          )}
        </div>
      )}
    </div>
  );
}

  const root = ReactDOM.createRoot(document.getElementById('root'));
  root.render(<App />);
  </script>
</body>
</html>
